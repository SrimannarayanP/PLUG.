# nixpacks.toml

[phases.setup]
# These are the OS-level dependencies required to compile mysqlclient
nixPkgs = ["python311", "mysql80", "pkg-config", "gcc"]

[phases.install]
# Standard python installation
cmds = ["python -m venv /opt/venv && /opt/venv/bin/pip install -r requirements.txt"]

[phases.build]
# Prepare your static files for Whitenoise
cmds = ["python manage.py collectstatic --noinput"]

[start]
# This starts your web server. 
# Note: You must have 'gunicorn' in your requirements.txt
cmd = "gunicorn backend.wsgi"

# If you want to run Celery on a separate Railway service:
cmd = "celery -A backend worker --loglevel=info"
