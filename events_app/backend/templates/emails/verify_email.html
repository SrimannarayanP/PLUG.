<!DOCTYPE html>

<html>
    <head>
        <style>
            body {
                font-family : "Helvetica Neue", Helvetica, Arial, sans-serif;
                background-color : #09090b;
                color : #ffffff;
                margin : 0;
                padding : 0;
            }

            .container {
                max-width : 600px;
                margin : 0 auto;
                padding : 40px 20px;
            }

            .header {
                text-align : center;
                margin-bottom : 30px;
            }

            .logo {
                font-size : 24px;
                font-weight : 900;
                letter-spacing : -1px;
                color : #ffffff;
                text-decoration : none;
                text-transform : uppercase;
            }

            .logo span {
                color : #f97316;
            }

            .card {
                background-color : #18181b;
                border : 1px;
                solid : #27272a;
                border-radius : 16px;
                padding : 40px;
                text-align : center;
                box-shadow : 0 4px 6px -1px rgba(0, 0, 0, 0.5); 
            }

            h1 {
                font-size : 20px;
                margin-top : 0;
                margin-bottom : 16px;
                color : #ffffff;
            }

            p {
                color : #a1a1aa;
                font-size : 14px;
                line-height : 1.6;
                margin-bottom : 24px;
            }

            .otp-box {
                background-color : #27272a;
                border-radius : 12px;
                padding : 16px;
                margin : 30px 0;
                letter-spacing : 8px;
                font-size : 32px;
                font-weight : bold;
                color : #f97316;
                font-family : monospace;
                border : 1px;
                dashed : #3f3f46;
                display : inline-block;
            }

            .footer {
                text-align : center;
                margin-top : 30px;
                color : #52525b;
                font-size : 12px;
            }
        </style>
    </head>

    <body>
        <div class = 'container'>
            <div class = 'header'>
                <div class = 'logo'>
                    PLUG<span>.</span>
                </div>

                <div class = 'card'>
                    <h1>Verify your email</h1>

                    <p>
                        Hi {{first_name}}, <br />
                        Use the code below to verify your account & get started.
                    </p>

                    <div class = 'otp-box'>
                        {{otp}}
                    </div>

                    <p style = "font-size : 12px; color : #71717a">
                        This code will expire in 10 minutes. <br />
                        If you didn't request this, you can safely ignore this email.
                    </p>
                </div>

                <div class = 'footer'>
                    &copy; 2025 PLUG. All rights reserved.
                </div>
            </div>
        </div>
    </body>
</html>
