<!DOCTYPE html>

<html>
    <head>
        <style>
            body {
                font-family : sans-serif;
                background-color : #f4f4f5;
                padding : 20px;
            }

            .container {
                max-width : 600px;
                margin : 0 auto;
                background : white;
                padding : 30px;
                border-radius : 10px;
            }

            .btn {
                display : inline-block;
                background-color : #ec4899;
                color : white;
                padding : 12px 24px;
                text-decoration : none;
                border-radius : 5px;
                font-weight : bold;
                margin-top : 20px;
            }

            .footer {
                margin-top : 20px;
                font-size : 12px;
                color : #71717a;
            }
        </style>
    </head>

    <body>
        <div class = 'container'>
            <h2>Reset Your Password</h2>
            
            <p>Hello,</p>
            
            <p>We received a request to reset the password for your PLUG. account</p>

            <p>Click the button below to set a new password:</p>

            <a 
                href = "{{reset_link}}"
                class = 'btn'
            >
                Reset Password
            </a>

            <p style = "margin-top : 30px;">
                If you didn't request this, you can safely ignore this email.
            </p>

            <div class = 'footer'>
                <p>Button not working? Paste this link into your browser:</p>

                <p>{{reset_link}}</p>
            </div>
        </div>
    </body>
</html>
